<ion-header>
  <ion-toolbar>
    <ion-title>Asignar Waypoints</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cancel()" aria-label="Cancelar y cerrar">Cerrar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div role="form" aria-labelledby="assign-title">
    <h2 id="assign-title" class="ion-margin-bottom">Distribución por Grupos</h2>
    <p class="ion-margin-bottom">Seleccione qué puntos de control debe visitar cada grupo.</p>

    <div *ngFor="let group of gymkhana.groups; let i = index" class="group-card ion-margin-bottom">
      <ion-card>
        <ion-card-header>
          <ion-card-title>{{ group.name }}</ion-card-title>
        </ion-card-header>
        <ion-card-content>
          <ion-list>
            <ion-item *ngFor="let wp of gymkhana.waypoints">
              <ion-label>{{ wp.name }}</ion-label>
              <ion-checkbox 
                slot="end" 
                [checked]="isWaypointSelected(i, wp.id)"
                (ionChange)="toggleWaypoint(i, wp.id, $event.detail.checked)"
                [aria-label]="'Asignar ' + wp.name + ' a ' + group.name">
              </ion-checkbox>
            </ion-item>
          </ion-list>
        </ion-card-content>
      </ion-card>
    </div>

    <div class="actions ion-margin-top">
      <ion-button expand="block" (click)="save()">
        Guardar Asignaciones
      </ion-button>
    </div>
  </div>
</ion-content>
